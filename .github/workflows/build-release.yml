on:
  workflow_dispatch:
    inputs:
      run_smoke_e2e:
        description: "Run RustDesk 1.4.6 smoke tests"
        required: false
        default: "false"
      run_playwright_e2e:
        description: "Run full-stack Playwright E2E tests"
        required: false
        default: "false"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  
jobs:
  smoke-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_smoke_e2e == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup go env
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'
      - name: run 1.4.6 smoke test
        run: |
          cd backend
          go test ./test/e2e -run TestE2E_Smoke_146_ClientHandshake -v

  playwright-e2e:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_playwright_e2e == 'true' }}
    runs-on: ubuntu-latest
    env:
      E2E_ADMIN_USER: admin
      E2E_ADMIN_PASS: admin123456
      E2E_BACKEND_URL: http://127.0.0.1:12345
      E2E_BASE_URL: http://127.0.0.1:9527
      E2E_SKIP_CAPTCHA: true
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go env
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install pnpm and dependencies
        run: |
          npm install -g pnpm
          cd soybean-admin
          pnpm i
          npx playwright install --with-deps chromium

      - name: prepare backend and admin user
        run: |
          cd backend
          go run . sync
          go run . user add "${E2E_ADMIN_USER}" "${E2E_ADMIN_PASS}" --admin || true

      - name: start backend
        run: |
          cd backend
          E2E_SKIP_CAPTCHA=true nohup go run . start > ../backend-e2e.log 2>&1 &

      - name: run playwright e2e
        run: |
          cd soybean-admin
          pnpm test:e2e

      - name: upload playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: soybean-admin/playwright-report

      - name: upload playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: soybean-admin/test-results

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4

      - name: setup go env
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'

      - name: install
        run: |
          sudo apt update
          sudo apt install make zip -y
          npm install -g pnpm
          cd soybean-admin && pnpm i
      
      - name: build
        run: |
          go env -w GOOS=${{matrix.os}}
          go env -w GOARCH=${{matrix.arch}}
          go build -C backend -o ../build/
          cd soybean-admin && pnpm build 
          cd .. && cp -R soybean-admin/dist build/
          cp backend/server.yaml build/

      - name: pack files
        run: |
          zip ${{matrix.os}}-${{matrix.arch}}.zip build/*

      - name: create release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{matrix.os}}-${{matrix.arch}}.zip
          
